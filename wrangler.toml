name = "portfolio-website"
main = "worker.js"
compatibility_date = "2025-05-01"

# Serve the static site from the repo root. The Worker (worker.js) runs only for
# requests that do not match a static file, e.g. /api/chat. Files listed in
# .assetsignore are not uploaded as public assets.
[assets]
directory = "."
binding = "ASSETS"

# --- Email verification + per-user daily limit (optional) ---
# These features turn on only when a KV namespace is bound here AND the Brevo
# secrets (BREVO_API_KEY, BREVO_SENDER_EMAIL) are set. Until then the chat keeps
# working with the simple email gate (no code, no limit).
#
# To enable: create a KV namespace, then uncomment the block below and paste its id.
#   npx wrangler kv namespace create CHAT_KV
# (or create it in the dashboard under Storage & Databases > KV). The namespace id
# is not a secret, so it is fine to commit it here.
#
[[kv_namespaces]]
binding = "CHAT_KV"
id = "1593091cf9294fde81abd2cf6828cdd0"
